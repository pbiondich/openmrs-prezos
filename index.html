  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

:  #231F20;\n\n  /* Semantic */\n  --primary: var(--brand-teal);\n  --accent:  var(--brand-orange);\n  --support: var(--brand-violet);\n  --gold:    var(--brand-gold);\n\n  /* Tints */\n  --teal-900: var(--brand-teal);\n  --teal-ink: #00635A;\n  --teal-deep: #003A36;\n  --teal-50:  #E6F5F3;\n\n  --violet-50: #EFEEF6;\n  --orange-50: #FCEEE4;\n  --gold-50:   #FCF2D9;\n\n  --ink: #1A1617;\n  --ink-70: rgba(35, 31, 32, 0.72);\n  --ink-55: rgba(35, 31, 32, 0.55);\n  --ink-40: rgba(35, 31, 32, 0.40);\n  --ink-20: rgba(35, 31, 32, 0.20);\n  --ink-10: rgba(35, 31, 32, 0.10);\n\n  --cream: #F1ECE0;\n  --paper: #F6F1E6;\n\n  --rule: rgba(35, 31, 32, 0.12);\n  --rule-strong: rgba(35, 31, 32, 0.25);\n}\n\n* { box-sizing: border-box; }\n\nhtml, body {\n  margin: 0;\n  padding: 0;\n  background: #000;\n  font-family: 'DM Sans', system-ui, sans-serif;\n  color: var(--ink);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* Every slide */\n.slide {\n  background: var(--paper);\n  color: var(--ink);\n  font-family: 'DM Sans', system-ui, sans-serif;\n  font-feature-settings: 'ss01' on, 'cv11' on;\n  display: flex;\n  position: relative;\n}\n\n/* Left sidebar accent — design system choice #3 */\n.slide .sidebar {\n  width: 96px;\n  flex-shrink: 0;\n  background: var(--teal-deep);\n  color: #fff;\n  padding: 56px 28px 48px;\n  display: flex;\n  flex-direction: column;\n  justify-content: space-between;\n  align-items: flex-start;\n}\n.slide .sidebar .mark {\n  width: 56px;\n  height: 56px;\n  display: block;\n  flex-shrink: 0;\n  background: var(--paper);\n  border-radius: 50%;\n  padding: 8px;\n}\n.slide .sidebar .foot {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 14px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  writing-mode: vertical-rl;\n  transform: rotate(180deg);\n  color: rgba(255,255,255,0.6);\n}\n.slide .sidebar .foot b { color: #fff; font-weight: 500; }\n\n/* Main content area */\n.slide .body {\n  flex: 1;\n  padding: 100px 100px 80px 100px;\n  display: flex;\n  flex-direction: column;\n  position: relative;\n  min-width: 0;\n}\n\n/* Eyebrow */\n.eyebrow {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 20px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--teal-ink);\n  margin: 0 0 28px 0;\n  display: flex;\n  align-items: center;\n  gap: 16px;\n}\n.eyebrow .dot {\n  width: 10px; height: 10px; border-radius: 50%;\n  background: var(--brand-orange);\n}\n.eyebrow .num { color: var(--ink-55); font-weight: 400; }\n\n/* Titles */\n.title {\n  font-family: 'Fraunces', Georgia, serif;\n  font-weight: 400;\n  font-variation-settings: 'opsz' 144;\n  font-size: 84px;\n  line-height: 1.02;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n  margin: 0 0 32px 0;\n  text-wrap: pretty;\n  max-width: 16ch;\n}\n.title .accent { color: var(--brand-orange); font-style: italic; font-weight: 400; }\n.title em { color: var(--brand-orange); font-style: italic; }\n\n.title--sm { font-size: 72px; }\n.title--xs { font-size: 60px; }\n\n.subtitle {\n  font-size: 32px;\n  line-height: 1.35;\n  color: var(--ink-70);\n  font-weight: 400;\n  max-width: 28ch;\n  text-wrap: pretty;\n  margin: 0;\n}\n\n/* Body text */\n.body-lg {\n  font-size: 34px;\n  line-height: 1.35;\n  color: var(--ink);\n  font-weight: 400;\n  text-wrap: pretty;\n}\n.body-md {\n  font-size: 28px;\n  line-height: 1.4;\n  color: var(--ink-70);\n  font-weight: 400;\n}\n.body-sm {\n  font-size: 24px;\n  line-height: 1.45;\n  color: var(--ink-70);\n}\n\n/* Footer meta on content slides */\n.slide .meta {\n  position: absolute;\n  left: 100px;\n  right: 100px;\n  bottom: 44px;\n  display: flex;\n  justify-content: space-between;\n  align-items: baseline;\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 18px;\n  letter-spacing: 0.1em;\n  color: var(--ink-40);\n  text-transform: uppercase;\n  border-top: 1px solid var(--rule);\n  padding-top: 18px;\n}\n.slide .meta b { color: var(--ink-70); font-weight: 500; }\n\n/* ── Cover slide ───────────────────────────────────────── */\n.cover {\n  background: var(--teal-deep);\n  color: #fff;\n  display: block;\n  position: relative;\n  overflow: hidden;\n}\n.cover .cover-inner {\n  position: absolute;\n  inset: 0;\n  padding: 96px 120px;\n  display: flex;\n  flex-direction: column;\n  justify-content: space-between;\n}\n.cover .cover-logo {\n  display: flex;\n  align-items: center;\n  gap: 22px;\n}\n.cover .cover-logo .glyph {\n  width: 96px;\n  height: 96px;\n  display: block;\n  background: var(--paper);\n  border-radius: 50%;\n  padding: 14px;\n}\n.cover .cover-logo .wordmark {\n  font-family: 'Nunito Sans', 'Avenir', 'DM Sans', sans-serif;\n  font-size: 52px;\n  font-weight: 400;\n  letter-spacing: -0.005em;\n  color: #fff;\n}\n.cover h1 {\n  font-family: 'Fraunces', serif;\n  font-weight: 400;\n  font-variation-settings: 'opsz' 144;\n  font-size: 128px;\n  line-height: 0.98;\n  letter-spacing: -0.025em;\n  margin: 0;\n  max-width: 18ch;\n  color: #fff;\n  text-wrap: pretty;\n}\n.cover h1 em {\n  font-style: italic;\n  color: var(--brand-orange);\n  font-weight: 400;\n}\n.cover .cover-meta {\n  display: flex;\n  justify-content: space-between;\n  align-items: flex-end;\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 18px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: rgba(255,255,255,0.55);\n}\n.cover .cover-meta b { color: #fff; font-weight: 500; }\n\n/* Section divider slides */\n.section-slide {\n  background: var(--teal-deep);\n  color: #fff;\n  display: block;\n  position: relative;\n}\n.section-slide .section-inner {\n  position: absolute;\n  inset: 0;\n  padding: 100px 120px;\n  display: flex;\n  flex-direction: column;\n  justify-content: space-between;\n}\n.section-slide .sec-num {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 22px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--brand-orange);\n}\n.section-slide .sec-title {\n  font-family: 'Fraunces', serif;\n  font-weight: 400;\n  font-variation-settings: 'opsz' 144;\n  font-size: 140px;\n  line-height: 0.98;\n  letter-spacing: -0.025em;\n  color: #fff;\n  margin: 0;\n  text-wrap: pretty;\n  max-width: 15ch;\n}\n.section-slide .sec-title em { color: var(--brand-orange); font-style: italic; }\n.section-slide .sec-sub {\n  font-size: 32px;\n  color: rgba(255,255,255,0.72);\n  max-width: 40ch;\n  line-height: 1.35;\n  margin-top: 28px;\n}\n\n/* Big figure */\n.big-figure {\n  font-family: 'Fraunces', serif;\n  font-variation-settings: 'opsz' 144;\n  font-weight: 400;\n  font-size: 220px;\n  line-height: 0.9;\n  letter-spacing: -0.04em;\n  color: var(--teal-deep);\n}\n.big-figure .unit {\n  font-size: 72px;\n  color: var(--ink);\n  margin-left: 8px;\n  letter-spacing: -0.02em;\n}\n\n/* Quote */\n.pull-quote {\n  font-family: 'Fraunces', serif;\n  font-weight: 400;\n  font-variation-settings: 'opsz' 144;\n  font-size: 60px;\n  line-height: 1.15;\n  letter-spacing: -0.015em;\n  color: var(--ink);\n  max-width: 24ch;\n  text-wrap: pretty;\n}\n\n/* Numbered list for principles */\n.num-list {\n  display: grid;\n  grid-template-columns: 1fr;\n  gap: 28px;\n  margin: 0;\n  padding: 0;\n  list-style: none;\n  counter-reset: n;\n}\n.num-list li {\n  display: grid;\n  grid-template-columns: 80px 1fr;\n  gap: 28px;\n  align-items: baseline;\n  padding: 20px 0;\n  border-top: 1px solid var(--rule);\n}\n.num-list.tight li { padding: 16px 0; }\n.num-list.tight li .ni-title { font-size: 34px; margin-bottom: 6px; }\n.num-list.tight li .ni-body { font-size: 22px; }\n.num-list li::before {\n  counter-increment: n;\n  content: counter(n, decimal-leading-zero);\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 22px;\n  letter-spacing: 0.12em;\n  color: var(--teal-ink);\n  padding-top: 8px;\n}\n.num-list li .ni-title {\n  font-family: 'Fraunces', serif;\n  font-size: 40px;\n  line-height: 1.15;\n  color: var(--ink);\n  margin-bottom: 10px;\n  font-variation-settings: 'opsz' 144;\n}\n.num-list li .ni-body {\n  font-size: 24px;\n  color: var(--ink-70);\n  line-height: 1.4;\n}\n\n/* Stats grid */\n.stats {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 0;\n  border-top: 1px solid var(--rule-strong);\n  border-bottom: 1px solid var(--rule-strong);\n}\n.stats .stat {\n  padding: 36px 32px 36px 0;\n  border-right: 1px solid var(--rule);\n}\n.stats .stat:last-child { border-right: 0; padding-right: 0; }\n.stats .stat .sv {\n  font-family: 'Fraunces', serif;\n  font-variation-settings: 'opsz' 144;\n  font-size: 88px;\n  line-height: 0.95;\n  letter-spacing: -0.03em;\n  color: var(--teal-deep);\n  margin-bottom: 12px;\n}\n.stats .stat .sv .u { font-size: 40px; color: var(--ink); letter-spacing: -0.02em; }\n.stats .stat .sl {\n  font-size: 20px;\n  color: var(--ink-70);\n  line-height: 1.35;\n  max-width: 20ch;\n}\n\n/* Two column layout */\n.two-col {\n  display: grid;\n  grid-template-columns: 1.1fr 1fr;\n  gap: 80px;\n  align-items: start;\n}\n\n/* Pillars (for funding models, etc) */\n.pillars {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 32px;\n  margin-top: 40px;\n}\n.pillar {\n  padding: 36px 32px 32px;\n  background: #FFFFFF;\n  border: 1px solid var(--rule);\n  position: relative;\n  display: flex;\n  flex-direction: column;\n  min-height: 460px;\n}\n.pillar .p-num {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 18px;\n  letter-spacing: 0.18em;\n  color: var(--teal-ink);\n  margin-bottom: 16px;\n  text-transform: uppercase;\n}\n.pillar .p-title {\n  font-family: 'Fraunces', serif;\n  font-variation-settings: 'opsz' 144;\n  font-size: 40px;\n  line-height: 1.1;\n  color: var(--ink);\n  margin: 0 0 14px 0;\n}\n.pillar .p-sub {\n  font-size: 22px;\n  color: var(--ink-70);\n  line-height: 1.4;\n  margin-bottom: 20px;\n}\n.pillar .p-feat {\n  font-size: 22px;\n  color: var(--ink);\n  border-top: 1px solid var(--rule);\n  padding-top: 18px;\n  margin-top: auto;\n  line-height: 1.5;\n}\n.pillar .p-feat .pf-label {\n  display: block;\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 14px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--ink-55);\n  margin-bottom: 8px;\n}\n\n/* Timeline */\n.timeline {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 0;\n  margin-top: 32px;\n  position: relative;\n}\n.timeline::before {\n  content: '';\n  position: absolute;\n  top: 26px;\n  left: 0; right: 0;\n  height: 2px;\n  background: var(--rule);\n  z-index: 0;\n}\n.tl-item {\n  position: relative;\n  padding: 0 32px 0 0;\n  z-index: 1;\n}\n.tl-item .tl-dot {\n  width: 28px; height: 28px;\n  border-radius: 50%;\n  background: var(--teal-deep);\n  border: 6px solid var(--paper);\n  box-shadow: 0 0 0 2px var(--teal-deep);\n  margin-bottom: 24px;\n}\n.tl-item.ghost .tl-dot { background: var(--paper); box-shadow: 0 0 0 2px var(--rule-strong); }\n.tl-item .tl-phase {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 18px;\n  letter-spacing: 0.14em;\n  color: var(--teal-ink);\n  text-transform: uppercase;\n  margin-bottom: 10px;\n}\n.tl-item .tl-title {\n  font-family: 'Fraunces', serif;\n  font-variation-settings: 'opsz' 144;\n  font-size: 40px;\n  line-height: 1.1;\n  color: var(--ink);\n  margin-bottom: 14px;\n}\n.tl-item .tl-body {\n  font-size: 22px;\n  color: var(--ink-70);\n  line-height: 1.4;\n  max-width: 22ch;\n}\n\n/* Rule list — cleaner than bullets */\n.rule-list {\n  list-style: none;\n  padding: 0;\n  margin: 0;\n}\n.rule-list li {\n  display: grid;\n  grid-template-columns: 180px 1fr;\n  gap: 32px;\n  padding: 22px 0;\n  border-top: 1px solid var(--rule);\n  align-items: baseline;\n}\n.rule-list li:last-child { border-bottom: 1px solid var(--rule); }\n.rule-list li .rl-k {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 18px;\n  letter-spacing: 0.12em;\n  color: var(--teal-ink);\n  text-transform: uppercase;\n}\n.rule-list li .rl-v {\n  font-size: 28px;\n  color: var(--ink);\n  line-height: 1.35;\n}\n\n/* Callout card — for ask slide */\n.callout {\n  background: var(--teal-deep);\n  color: #fff;\n  padding: 48px 52px;\n  position: relative;\n}\n.callout .co-label {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 18px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--brand-orange);\n  margin-bottom: 18px;\n}\n.callout .co-body {\n  font-family: 'Fraunces', serif;\n  font-variation-settings: 'opsz' 144;\n  font-size: 48px;\n  line-height: 1.15;\n  color: #fff;\n  margin: 0;\n}\n\n/* Map slide */\n.country-list {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 8px 28px;\n  font-size: 22px;\n  color: var(--ink-70);\n  margin-top: 12px;\n}\n\n\n/* Authentic OpenMRS mark usage */\n.cover-watermark {\n  position: absolute;\n  width: 1100px; height: 1100px;\n  right: -220px; bottom: -360px;\n  opacity: 0.18;\n  pointer-events: none;\n}\n.section-watermark {\n  position: absolute;\n  width: 680px; height: 680px;\n  right: 60px; top: 80px;\n  opacity: 1;\n  pointer-events: none;\n}\n/* Small mark in meta footer for brand presence */\n.slide .meta-mark {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n}\n.slide .meta-mark svg {\n  width: 18px; height: 18px;\n}\n\n/* Utils */\n.mt-auto { margin-top: auto; }\n.mt-40 { margin-top: 40px; }\n.mt-56 { margin-top: 56px; }\n.mt-80 { margin-top: 80px; }\n.spacer { flex: 1; }\n\n<\u002Fstyle>\n<script>\n/**\n * <deck-stage> — reusable web component for HTML decks.\n *\n * Handles:\n *  (a) speaker notes — reads <script type=\"application/json\" id=\"speaker-notes\">\n *      and posts {slideIndexChanged: N} to the parent window on nav.\n *  (b) keyboard navigation — ←/→, PgUp/PgDn, Space, Home/End, number keys.\n *  (c) press R to reset to slide 0 (with a tasteful keyboard hint).\n *  (d) bottom-center overlay showing slide count + hints, fades out on idle.\n *  (e) auto-scaling — inner canvas is a fixed design size (default 1920×1080)\n *      scaled with `transform: scale()` to fit the viewport, letterboxed.\n *      Set the `noscale` attribute to render at authored size (1:1) — the\n *      PPTX exporter sets this so its DOM capture sees unscaled geometry.\n *  (f) print — `@media print` lays every slide out as its own page at the\n *      design size, so the browser's Print → Save as PDF produces a clean\n *      one-page-per-slide PDF with no extra setup.\n *\n * Slides are HIDDEN, not unmounted. Non-active slides stay in the DOM with\n * `visibility: hidden` + `opacity: 0`, so their state (videos, iframes,\n * form inputs, React trees) is preserved across navigation.\n *\n * Lifecycle event — the component dispatches a `slidechange` CustomEvent on\n * itself whenever the active slide changes (including the initial mount).\n * The event bubbles and composes out of shadow DOM, so you can listen on\n * the <deck-stage> element or on document:\n *\n *   document.querySelector('deck-stage').addEventListener('slidechange', (e) => {\n *     e.detail.index         // new 0-based index\n *     e.detail.previousIndex // previous index, or -1 on init\n *     e.detail.total         // total slide count\n *     e.detail.slide         // the new active slide element\n *     e.detail.previousSlide // the prior slide element, or null on init\n *     e.detail.reason        // 'init' | 'keyboard' | 'click' | 'tap' | 'api'\n *   });\n *\n * Persistence: current slide index is saved to localStorage keyed by the\n * document path, so refresh returns you to the same place.\n *\n * Usage:\n *   <deck-stage width=\"1920\" height=\"1080\">\n *     <section data-label=\"Title\">...<\u002Fsection>\n *     <section data-label=\"Agenda\">...<\u002Fsection>\n *   <\u002Fdeck-stage>\n *\n * Slides are the direct element children of <deck-stage>. Each slide is\n * automatically tagged with:\n *   - data-screen-label=\"NN Label\"   (1-indexed, for comment flow)\n *   - data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\"\n */\n\n(() => {\n  const DESIGN_W_DEFAULT = 1920;\n  const DESIGN_H_DEFAULT = 1080;\n  const STORAGE_PREFIX = 'deck-stage:slide:';\n  const OVERLAY_HIDE_MS = 1800;\n  const VALIDATE_ATTR = 'no_overflowing_text,no_overlapping_text,slide_sized_text';\n\n  const pad2 = (n) => String(n).padStart(2, '0');\n\n  const stylesheet = `\n    :host {\n      position: fixed;\n      inset: 0;\n      display: block;\n      background: #000;\n      color: #fff;\n      font-family: -apple-system, BlinkMacSystemFont, \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n      overflow: hidden;\n    }\n\n    .stage {\n      position: absolute;\n      inset: 0;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n    }\n\n    .canvas {\n      position: relative;\n      transform-origin: center center;\n      flex-shrink: 0;\n      background: #fff;\n      will-change: transform;\n    }\n\n    /* Slides live in light DOM (via <slot>) so authored CSS still applies.\n       We absolutely position each slotted child to stack them. */\n    ::slotted(*) {\n      position: absolute !important;\n      inset: 0 !important;\n      width: 100% !important;\n      height: 100% !important;\n      box-sizing: border-box !important;\n      overflow: hidden;\n      opacity: 0;\n      pointer-events: none;\n      visibility: hidden;\n    }\n    ::slotted([data-deck-active]) {\n      opacity: 1;\n      pointer-events: auto;\n      visibility: visible;\n    }\n\n    /* Tap zones for mobile — back/forward thirds like Stories.\n       Transparent, no visible UI, don't block the overlay. */\n    .tapzones {\n      position: fixed;\n      inset: 0;\n      display: flex;\n      z-index: 2147482000;\n      pointer-events: none;\n    }\n    .tapzone {\n      flex: 1;\n      pointer-events: auto;\n      -webkit-tap-highlight-color: transparent;\n    }\n    /* Only activate tap zones on coarse pointers (touch devices). */\n    @media (hover: hover) and (pointer: fine) {\n      .tapzones { display: none; }\n    }\n\n    .overlay {\n      position: fixed;\n      left: 50%;\n      bottom: 22px;\n      transform: translate(-50%, 6px) scale(0.92);\n      filter: blur(6px);\n      display: flex;\n      align-items: center;\n      gap: 4px;\n      padding: 4px;\n      background: #000;\n      color: #fff;\n      border-radius: 999px;\n      font-size: 12px;\n      font-feature-settings: \"tnum\" 1;\n      letter-spacing: 0.01em;\n      opacity: 0;\n      pointer-events: none;\n      transition: opacity 260ms ease, transform 260ms cubic-bezier(.2,.8,.2,1), filter 260ms ease;\n      transform-origin: center bottom;\n      z-index: 2147483000;\n      user-select: none;\n    }\n    .overlay[data-visible] {\n      opacity: 1;\n      pointer-events: auto;\n      transform: translate(-50%, 0) scale(1);\n      filter: blur(0);\n    }\n\n    .btn {\n      appearance: none;\n      -webkit-appearance: none;\n      background: transparent;\n      border: 0;\n      margin: 0;\n      padding: 0;\n      color: inherit;\n      font: inherit;\n      cursor: default;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      height: 28px;\n      min-width: 28px;\n      border-radius: 999px;\n      color: rgba(255,255,255,0.72);\n      transition: background 140ms ease, color 140ms ease;\n      -webkit-tap-highlight-color: transparent;\n    }\n    .btn:hover { background: rgba(255,255,255,0.12); color: #fff; }\n    .btn:active { background: rgba(255,255,255,0.18); }\n    .btn:focus { outline: none; }\n    .btn:focus-visible { outline: none; }\n    .btn::-moz-focus-inner { border: 0; }\n    .btn svg { width: 14px; height: 14px; display: block; }\n    .btn.reset {\n      font-size: 11px;\n      font-weight: 500;\n      letter-spacing: 0.02em;\n      padding: 0 10px 0 12px;\n      gap: 6px;\n      color: rgba(255,255,255,0.72);\n    }\n    .btn.reset .kbd {\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      min-width: 16px;\n      height: 16px;\n      padding: 0 4px;\n      font-family: ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n      font-size: 10px;\n      line-height: 1;\n      color: rgba(255,255,255,0.88);\n      background: rgba(255,255,255,0.12);\n      border-radius: 4px;\n    }\n\n    .count {\n      font-variant-numeric: tabular-nums;\n      color: #fff;\n      font-weight: 500;\n      padding: 0 8px;\n      min-width: 42px;\n      text-align: center;\n      font-size: 12px;\n    }\n    .count .sep { color: rgba(255,255,255,0.45); margin: 0 3px; font-weight: 400; }\n    .count .total { color: rgba(255,255,255,0.55); }\n\n    .divider {\n      width: 1px;\n      height: 14px;\n      background: rgba(255,255,255,0.18);\n      margin: 0 2px;\n    }\n\n    /* ── Print: one page per slide, no chrome ────────────────────────────\n       The screen layout stacks every slide at inset:0 inside a scaled\n       canvas; for print we want them in document flow at the authored\n       design size so the browser paginates one slide per sheet. The\n       @page size is set from the width/height attributes via the inline\n       <style id=\"deck-stage-print-page\"> that connectedCallback injects\n       into <head> (the @page at-rule has no effect inside shadow DOM). */\n    @media print {\n      :host {\n        position: static;\n        inset: auto;\n        background: none;\n        overflow: visible;\n        color: inherit;\n      }\n      .stage { position: static; display: block; }\n      .canvas {\n        transform: none !important;\n        width: auto !important;\n        height: auto !important;\n        background: none;\n        will-change: auto;\n      }\n      ::slotted(*) {\n        position: relative !important;\n        inset: auto !important;\n        width: var(--deck-design-w) !important;\n        height: var(--deck-design-h) !important;\n        box-sizing: border-box !important;\n        opacity: 1 !important;\n        visibility: visible !important;\n        pointer-events: auto;\n        break-after: page;\n        page-break-after: always;\n        break-inside: avoid;\n        overflow: hidden;\n      }\n      ::slotted(*:last-child) {\n        break-after: auto;\n        page-break-after: auto;\n      }\n      .overlay, .tapzones { display: none !important; }\n    }\n  `;\n\n  class DeckStage extends HTMLElement {\n    static get observedAttributes() { return ['width', 'height', 'noscale']; }\n\n    constructor() {\n      super();\n      this._root = this.attachShadow({ mode: 'open' });\n      this._index = 0;\n      this._slides = [];\n      this._notes = [];\n      this._hideTimer = null;\n      this._mouseIdleTimer = null;\n      this._storageKey = STORAGE_PREFIX + (location.pathname || '/');\n\n      this._onKey = this._onKey.bind(this);\n      this._onResize = this._onResize.bind(this);\n      this._onSlotChange = this._onSlotChange.bind(this);\n      this._onMouseMove = this._onMouseMove.bind(this);\n      this._onTapBack = this._onTapBack.bind(this);\n      this._onTapForward = this._onTapForward.bind(this);\n    }\n\n    get designWidth() {\n      return parseInt(this.getAttribute('width'), 10) || DESIGN_W_DEFAULT;\n    }\n    get designHeight() {\n      return parseInt(this.getAttribute('height'), 10) || DESIGN_H_DEFAULT;\n    }\n\n    connectedCallback() {\n      this._render();\n      this._loadNotes();\n      this._syncPrintPageRule();\n      window.addEventListener('keydown', this._onKey);\n      window.addEventListener('resize', this._onResize);\n      window.addEventListener('mousemove', this._onMouseMove, { passive: true });\n      // Initial collection + layout happens via slotchange, which fires on mount.\n    }\n\n    disconnectedCallback() {\n      window.removeEventListener('keydown', this._onKey);\n      window.removeEventListener('resize', this._onResize);\n      window.removeEventListener('mousemove', this._onMouseMove);\n      if (this._hideTimer) clearTimeout(this._hideTimer);\n      if (this._mouseIdleTimer) clearTimeout(this._mouseIdleTimer);\n    }\n\n    attributeChangedCallback() {\n      if (this._canvas) {\n        this._canvas.style.width = this.designWidth + 'px';\n        this._canvas.style.height = this.designHeight + 'px';\n        this._canvas.style.setProperty('--deck-design-w', this.designWidth + 'px');\n        this._canvas.style.setProperty('--deck-design-h', this.designHeight + 'px');\n        this._fit();\n        this._syncPrintPageRule();\n      }\n    }\n\n    _render() {\n      const style = document.createElement('style');\n      style.textContent = stylesheet;\n\n      const stage = document.createElement('div');\n      stage.className = 'stage';\n\n      const canvas = document.createElement('div');\n      canvas.className = 'canvas';\n      canvas.style.width = this.designWidth + 'px';\n      canvas.style.height = this.designHeight + 'px';\n      canvas.style.setProperty('--deck-design-w', this.designWidth + 'px');\n      canvas.style.setProperty('--deck-design-h', this.designHeight + 'px');\n\n      const slot = document.createElement('slot');\n      slot.addEventListener('slotchange', this._onSlotChange);\n      canvas.appendChild(slot);\n      stage.appendChild(canvas);\n\n      // Tap zones (mobile): left third = back, right third = forward.\n      const tapzones = document.createElement('div');\n      tapzones.className = 'tapzones export-hidden';\n      tapzones.setAttribute('aria-hidden', 'true');\n      const tzBack = document.createElement('div');\n      tzBack.className = 'tapzone tapzone--back';\n      const tzMid = document.createElement('div');\n      tzMid.className = 'tapzone tapzone--mid';\n      tzMid.style.pointerEvents = 'none';\n      const tzFwd = document.createElement('div');\n      tzFwd.className = 'tapzone tapzone--fwd';\n      tzBack.addEventListener('click', this._onTapBack);\n      tzFwd.addEventListener('click', this._onTapForward);\n      tapzones.append(tzBack, tzMid, tzFwd);\n\n      // Overlay: compact, solid black, with clickable controls.\n      const overlay = document.createElement('div');\n      overlay.className = 'overlay export-hidden';\n      overlay.setAttribute('role', 'toolbar');\n      overlay.setAttribute('aria-label', 'Deck controls');\n      overlay.innerHTML = `\n        <button class=\"btn prev\" type=\"button\" aria-label=\"Previous slide\" title=\"Previous (←)\">\n          <svg viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M10 3L5 8l5 5\"/><\u002Fsvg>\n        <\u002Fbutton>\n        <span class=\"count\" aria-live=\"polite\"><span class=\"current\">1<\u002Fspan><span class=\"sep\">/<\u002Fspan><span class=\"total\">1<\u002Fspan><\u002Fspan>\n        <button class=\"btn next\" type=\"button\" aria-label=\"Next slide\" title=\"Next (→)\">\n          <svg viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M6 3l5 5-5 5\"/><\u002Fsvg>\n        <\u002Fbutton>\n        <span class=\"divider\"><\u002Fspan>\n        <button class=\"btn reset\" type=\"button\" aria-label=\"Reset to first slide\" title=\"Reset (R)\">Reset<span class=\"kbd\">R<\u002Fspan><\u002Fbutton>\n      `;\n\n      overlay.querySelector('.prev').addEventListener('click', () => this._go(this._index - 1, 'click'));\n      overlay.querySelector('.next').addEventListener('click', () => this._go(this._index + 1, 'click'));\n      overlay.querySelector('.reset').addEventListener('click', () => this._go(0, 'click'));\n\n      this._root.append(style, stage, tapzones, overlay);\n      this._canvas = canvas;\n      this._slot = slot;\n      this._overlay = overlay;\n      this._countEl = overlay.querySelector('.current');\n      this._totalEl = overlay.querySelector('.total');\n    }\n\n    /** @page must live in the document stylesheet — it's a no-op inside\n     *  shadow DOM. Inject/update a single <head> style tag so the print\n     *  sheet matches the design size and Save-as-PDF yields one slide per\n     *  page with no margins. */\n    _syncPrintPageRule() {\n      const id = 'deck-stage-print-page';\n      let tag = document.getElementById(id);\n      if (!tag) {\n        tag = document.createElement('style');\n        tag.id = id;\n        document.head.appendChild(tag);\n      }\n      tag.textContent =\n        '@page { size: ' + this.designWidth + 'px ' + this.designHeight + 'px; margin: 0; } ' +\n        '@media print { html, body { margin: 0 !important; padding: 0 !important; background: none !important; overflow: visible !important; height: auto !important; } ' +\n        '* { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }';\n    }\n\n    _onSlotChange() {\n      this._collectSlides();\n      this._restoreIndex();\n      this._applyIndex({ showOverlay: false, broadcast: true, reason: 'init' });\n      this._fit();\n    }\n\n    _collectSlides() {\n      const assigned = this._slot.assignedElements({ flatten: true });\n      this._slides = assigned.filter((el) => {\n        // Skip template/style/script nodes even if someone slots them.\n        const tag = el.tagName;\n        return tag !== 'TEMPLATE' && tag !== 'SCRIPT' && tag !== 'STYLE';\n      });\n\n      this._slides.forEach((slide, i) => {\n        const n = i + 1;\n        // Determine a label for comment flow: prefer explicit data-label,\n        // then an existing data-screen-label, then first heading, else \"Slide\".\n        let label = slide.getAttribute('data-label');\n        if (!label) {\n          const existing = slide.getAttribute('data-screen-label');\n          if (existing) {\n            // Strip any leading number the author may have included.\n            label = existing.replace(/^\\s*\\d+\\s*/, '').trim() || existing;\n          }\n        }\n        if (!label) {\n          const h = slide.querySelector('h1, h2, h3, [data-title]');\n          if (h) label = (h.textContent || '').trim().slice(0, 40);\n        }\n        if (!label) label = 'Slide';\n        slide.setAttribute('data-screen-label', `${pad2(n)} ${label}`);\n\n        // Validation attribute for comment flow / auto-checks.\n        if (!slide.hasAttribute('data-om-validate')) {\n          slide.setAttribute('data-om-validate', VALIDATE_ATTR);\n        }\n\n        slide.setAttribute('data-deck-slide', String(i));\n      });\n\n      if (this._totalEl) this._totalEl.textContent = String(this._slides.length || 1);\n      if (this._index >= this._slides.length) this._index = Math.max(0, this._slides.length - 1);\n    }\n\n    _loadNotes() {\n      const tag = document.getElementById('speaker-notes');\n      if (!tag) { this._notes = []; return; }\n      try {\n        const parsed = JSON.parse(tag.textContent || '[]');\n        if (Array.isArray(parsed)) this._notes = parsed;\n      } catch (e) {\n        console.warn('[deck-stage] Failed to parse #speaker-notes JSON:', e);\n        this._notes = [];\n      }\n    }\n\n    _restoreIndex() {\n      try {\n        const raw = localStorage.getItem(this._storageKey);\n        if (raw != null) {\n          const n = parseInt(raw, 10);\n          if (Number.isFinite(n) && n >= 0 && n < this._slides.length) {\n            this._index = n;\n          }\n        }\n      } catch (e) { /* ignore */ }\n    }\n\n    _persistIndex() {\n      try { localStorage.setItem(this._storageKey, String(this._index)); }\n      catch (e) { /* ignore */ }\n    }\n\n    _applyIndex({ showOverlay = true, broadcast = true, reason = 'init' } = {}) {\n      if (!this._slides.length) return;\n      const prev = this._prevIndex == null ? -1 : this._prevIndex;\n      const curr = this._index;\n      this._slides.forEach((s, i) => {\n        if (i === curr) s.setAttribute('data-deck-active', '');\n        else s.removeAttribute('data-deck-active');\n      });\n      if (this._countEl) this._countEl.textContent = String(curr + 1);\n      this._persistIndex();\n\n      if (broadcast) {\n        // (1) Legacy: host-window postMessage for speaker-notes renderers.\n        try { window.postMessage({ slideIndexChanged: curr }, '*'); } catch (e) {}\n\n        // (2) In-page CustomEvent on the <deck-stage> element itself.\n        //     Bubbles and composes out of shadow DOM so slide code can listen:\n        //       document.querySelector('deck-stage').addEventListener('slidechange', e => {\n        //         e.detail.index, e.detail.previousIndex, e.detail.total, e.detail.slide, e.detail.reason\n        //       });\n        const detail = {\n          index: curr,\n          previousIndex: prev,\n          total: this._slides.length,\n          slide: this._slides[curr] || null,\n          previousSlide: prev >= 0 ? (this._slides[prev] || null) : null,\n          reason: reason, // 'init' | 'keyboard' | 'click' | 'tap' | 'api'\n        };\n        this.dispatchEvent(new CustomEvent('slidechange', {\n          detail,\n          bubbles: true,\n          composed: true,\n        }));\n      }\n\n      this._prevIndex = curr;\n      if (showOverlay) this._flashOverlay();\n    }\n\n    _flashOverlay() {\n      if (!this._overlay) return;\n      this._overlay.setAttribute('data-visible', '');\n      if (this._hideTimer) clearTimeout(this._hideTimer);\n      this._hideTimer = setTimeout(() => {\n        this._overlay.removeAttribute('data-visible');\n      }, OVERLAY_HIDE_MS);\n    }\n\n    _fit() {\n      if (!this._canvas) return;\n      // PPTX export sets noscale so the DOM capture sees authored-size\n      // geometry — the scaled canvas is in shadow DOM, so the exporter's\n      // resetTransformSelector can't reach .canvas.style.transform directly.\n      if (this.hasAttribute('noscale')) {\n        this._canvas.style.transform = 'none';\n        return;\n      }\n      const vw = window.innerWidth;\n      const vh = window.innerHeight;\n      const s = Math.min(vw / this.designWidth, vh / this.designHeight);\n      this._canvas.style.transform = `scale(${s})`;\n    }\n\n    _onResize() { this._fit(); }\n\n    _onMouseMove() {\n      // Keep overlay visible while mouse moves; hide after idle.\n      this._flashOverlay();\n    }\n\n    _onTapBack(e) {\n      e.preventDefault();\n      this._go(this._index - 1, 'tap');\n    }\n\n    _onTapForward(e) {\n      e.preventDefault();\n      this._go(this._index + 1, 'tap');\n    }\n\n    _onKey(e) {\n      // Ignore when the user is typing.\n      const t = e.target;\n      if (t && (t.isContentEditable || /^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName))) return;\n      if (e.metaKey || e.ctrlKey || e.altKey) return;\n\n      const key = e.key;\n      let handled = true;\n\n      if (key === 'ArrowRight' || key === 'PageDown' || key === ' ' || key === 'Spacebar') {\n        this._go(this._index + 1, 'keyboard');\n      } else if (key === 'ArrowLeft' || key === 'PageUp') {\n        this._go(this._index - 1, 'keyboard');\n      } else if (key === 'Home') {\n        this._go(0, 'keyboard');\n      } else if (key === 'End') {\n        this._go(this._slides.length - 1, 'keyboard');\n      } else if (key === 'r' || key === 'R') {\n        this._go(0, 'keyboard');\n      } else if (/^[0-9]$/.test(key)) {\n        // 1..9 jump to that slide; 0 jumps to 10.\n        const n = key === '0' ? 9 : parseInt(key, 10) - 1;\n        if (n < this._slides.length) this._go(n, 'keyboard');\n      } else {\n        handled = false;\n      }\n\n      if (handled) {\n        e.preventDefault();\n        this._flashOverlay();\n      }\n    }\n\n    _go(i, reason = 'api') {\n      if (!this._slides.length) return;\n      const clamped = Math.max(0, Math.min(this._slides.length - 1, i));\n      if (clamped === this._index) {\n        this._flashOverlay();\n        return;\n      }\n      this._index = clamped;\n      this._applyIndex({ showOverlay: true, broadcast: true, reason });\n    }\n\n    // Public API ------------------------------------------------------------\n\n    /** Current slide index (0-based). */\n    get index() { return this._index; }\n    /** Total slide count. */\n    get length() { return this._slides.length; }\n    /** Programmatically navigate. */\n    goTo(i) { this._go(i, 'api'); }\n    next() { this._go(this._index + 1, 'api'); }\n    prev() { this._go(this._index - 1, 'api'); }\n    reset() { this._go(0, 'api'); }\n  }\n\n  if (!customElements.get('deck-stage')) {\n    customElements.define('deck-stage', DeckStage);\n  }\n})();\n\n<\u002Fscript>\n<script type=\"application/json\" id=\"speaker-notes\">\n[\n  \"Thanks for making time. I'm here to talk about OpenMRS — the open source medical record system used in over eighty countries — and specifically about a new chapter. We've spent twenty years proving the platform works. The next twenty are about making sure it's funded like the infrastructure it is. I'll walk you through the problem we solve, where we stand today, and a concrete plan to get there. About fifteen, twenty minutes, and then I'd love to hear what you're thinking.\",\n\n  \"Let me start with what's actually happening on the ground in most of the world. A health worker sees a patient. They write something on paper, or in a spreadsheet, or in a system that doesn't talk to the clinic next door. When that patient shows up somewhere else — or comes back in six months — there's no record. No history. No continuity. You can't run a health system that way. You can't spot an outbreak, you can't manage chronic disease, you can't prove an intervention worked. The data just isn't there.\",\n\n  \"So you might ask — why hasn't the market fixed this? Two reasons. First, in most places there's simply nothing. Second, where something does exist, it's usually a proprietary system sold by an outside vendor, built without real clinical input, and locked down so countries can't adapt it. Funding comes project by project — three years for HIV, two years for maternal health — and when the grant ends, the system dies. No one's building infrastructure. Everyone's building pilots.\",\n\n  \"Here's why this matters right now. Governments across Africa and Asia are writing digital health strategies and they want to own them. Traditional donor funding is tightening. Populations are growing faster than health workforces. And the tools we build in this decade will determine what care looks like for the next generation. There's a narrow window where the right infrastructure investment compounds for decades.\",\n\n  \"OpenMRS is that infrastructure. We're a global digital public good. Eighty-plus countries. Millions of patients on the platform today. National deployments in multiple countries. Twenty years of clinical, engineering, and implementation experience baked in. When a ministry of health wants a real EMR, OpenMRS is on the shortlist — and increasingly, it's the default choice.\",\n\n  \"What makes it work is the community. Thousands of contributors — developers, clinicians, implementers — all improving the same codebase. No single vendor. No lock-in. A neutral platform that governments, NGOs, and businesses can all build on without worrying about who controls the roadmap. That's the moat, and it's a moat money can't buy.\",\n\n  \"The value lands differently depending on who you are. A government gets a low-cost, sovereign system they actually own. A local tech business gets a platform they can build services on top of. A funder gets an investment that scales globally — fund it once in Kenya, it improves the system in Uganda and Mozambique and Haiti. That compounding is the whole point.\",\n\n  \"Structurally, it's a layered model. OpenMRS Inc. — the nonprofit — holds the IP, runs infrastructure, and supports the community. The community writes and maintains the core. Local partners — companies, NGOs, ministries — implement it on the ground. And governments ultimately own and sustain the systems in their country. Each layer does what it's best at.\",\n\n  \"By 2030, we want most deployments to be locally owned and financed. We want a thriving business ecosystem of implementers and service providers. We want OpenMRS Inc. funded predictably rather than grant-to-grant. And we want OpenMRS embedded in national health infrastructure — the way roads or electricity grids are. That's the destination.\",\n\n  \"Quick note on who's doing this. It's a lean global team with twenty-plus years of health informatics experience. We have real relationships with ministries of health, we know the major implementers, and we punch way above our weight because most of the work happens through the community. You're not funding a big org — you're funding the leverage point.\",\n\n  \"Now here's the honest part. We have scale. We have adoption. We have impact. What we don't have is stable funding. OpenMRS Inc. runs on fragmented, project-based grants — the same short-horizon funding that undermines every good implementation. If we want the platform to be infrastructure, we have to fund it like infrastructure. That's what I want to talk about next.\",\n\n  \"We've mapped three complementary paths. One: public infrastructure — governments pay for the platform as part of their health system. Two: ecosystem contribution — monetize the network of partners building on top of OpenMRS, not the platform itself. Three: enterprise services — offer hosting, support, and advanced capabilities to implementers who need them. These aren't either-or. They reinforce each other.\",\n\n  \"Model one is the long game. Governments fund OpenMRS directly as core health infrastructure, through national agreements or pooled funding arrangements. It scales naturally with adoption. It's the right end state — but it takes time to activate. We need other models running while we build toward this.\",\n\n  \"Model two is the most interesting near-term. We don't charge for the platform — it stays free. But we build a certification program, a tiered partner network, and eventually a marketplace, and those generate recurring revenue. It also strengthens quality: partners have a reason to meet a standard, and buyers have a signal they can trust.\",\n\n  \"Model three is the fastest to revenue. Hosting, SLAs, premium support, advanced features. Implementers already pay for this today — just not to us. If we can execute well, it's a real business and it compounds. The catch is it requires actual product and operational maturity, which is where philanthropic support comes in.\",\n\n  \"So here's the ask. Fund the core functions of OpenMRS Inc. for a defined runway while we test and stand up these models. That covers the community, the IP and infrastructure, the events that keep contributors engaged, and the small team that makes it all work. Not forever — just long enough for the financing models to take root. Think of it as catalytic capital: you underwrite the transition, and the system pays for itself after.\",\n\n  \"The rollout is phased. First two years: services and ecosystem — the fastest revenue, plus product maturation. Years two to five: we start positioning for government funding, building the national-level relationships and evidence base. Year five and beyond: infrastructure funding comes online and the system becomes self-sustaining. Each phase de-risks the next.\",\n\n  \"If this works — and I think it does work — you've funded one of the most leveraged things in global health. A platform serving hundreds of millions of patients, owned by the countries that use it, with predictable funding, strong quality, and a clear value exchange with every stakeholder. That's what sustainable infrastructure looks like. I'd love to talk about how you want to be involved.\"\n]\n<\u002Fscript>\n<\u002Fhead>\n<body>\n\n\n\n\n<svg style=\"position:absolute;width:0;height:0\" aria-hidden=\"true\">\n  <defs>\n    <symbol id=\"omrs-mark\" viewBox=\"0 0 48 48\">\n      <path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath>\n      <path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath>\n      <path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath>\n      <path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath>\n    <\u002Fsymbol>\n    <symbol id=\"omrs-mark-reversed\" viewBox=\"0 0 48 48\">\n      <path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath>\n      <path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath>\n      <path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath>\n      <path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath>\n    <\u002Fsymbol>\n  <\u002Fdefs>\n<\u002Fsvg>\n\n<deck-stage width=\"1920\" height=\"1080\">\n\n  <!-- 1. COVER -->\n  <section class=\"cover\" data-label=\"Cover\">\n    <svg class=\"cover-watermark\" viewBox=\"0 0 48 48\" xmlns=\"http://www.w3.org/2000/svg\"><path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath><path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath><path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath><path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath><\u002Fsvg>\n    <div class=\"cover-inner\">\n      <div class=\"cover-logo\">\n        <svg class=\"glyph\" viewBox=\"0 0 48 48\" xmlns=\"http://www.w3.org/2000/svg\"><path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath><path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath><path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath><path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath><\u002Fsvg>\n        <div class=\"wordmark\">OpenMRS<\u002Fdiv>\n      <\u002Fdiv>\n\n      <h1>A path to <em>sustainable<\u002Fem><br>health infrastructure.<\u002Fh1>\n\n      <div class=\"cover-meta\">\n        <div><b>Pitch<\u002Fb> &nbsp; — &nbsp; Sustainable Financing<\u002Fdiv>\n        <div>2026<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 2. THE PROBLEM -->\n  <section class=\"slide\" data-label=\"The Problem\">\n    <aside class=\"sidebar\">\n      <svg class=\"mark\" viewBox=\"0 0 48 48\" xmlns=\"http://www.w3.org/2000/svg\"><path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath><path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath><path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath><path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath><\u002Fsvg>\n      <div class=\"foot\"><b>OpenMRS<\u002Fb> · The Problem<\u002Fdiv>\n    <\u002Faside>\n    <div class=\"body\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>The Problem<\u002Fspan><span class=\"num\">· 01<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title title--sm\" style=\"margin-bottom: 40px;\">Health systems can't see <em>their own patients.<\u002Fem><\u002Fh2>\n      <p class=\"subtitle\" style=\"margin-top: 8px;\">In most of the world, a patient's history disappears the moment they walk out of the clinic — fragmented across paper, pilots, and proprietary silos.<\u002Fp>\n\n      <div class=\"mt-80\">\n        <ul class=\"rule-list\">\n          <li><div class=\"rl-k\">01 / Fragmented<\u002Fdiv><div class=\"rl-v\">Patient data is scattered, incomplete, or inaccessible.<\u002Fdiv><\u002Fli>\n          <li><div class=\"rl-k\">02 / Ill-fit<\u002Fdiv><div class=\"rl-v\">Health workers lack an EMR built for how they actually work.<\u002Fdiv><\u002Fli>\n          <li><div class=\"rl-k\">03 / Siloed<\u002Fdiv><div class=\"rl-v\">Systems are rigid, single-purpose, and rarely built to last.<\u002Fdiv><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"meta\"><span><b>01<\u002Fb> — The Problem<\u002Fspan><span>OpenMRS · Pitch 2026<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 3. THE GAP -->\n  <section class=\"slide\" data-label=\"The Gap\">\n    <aside class=\"sidebar\">\n      <svg class=\"mark\" viewBox=\"0 0 48 48\" xmlns=\"http://www.w3.org/2000/svg\"><path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath><path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath><path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath><path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath><\u002Fsvg>\n      <div class=\"foot\"><b>OpenMRS<\u002Fb> · The Gap<\u002Fdiv>\n    <\u002Faside>\n    <div class=\"body\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>The Gap<\u002Fspan><span class=\"num\">· 02<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title title--sm\">The tools that exist aren't<br><em>built for the job.<\u002Fem><\u002Fh2>\n\n      <div class=\"two-col mt-56\">\n        <div>\n          <div class=\"body-lg\" style=\"margin-bottom:24px;\">Either nothing exists — or rigid, third-party systems built without clinical expertise dominate the market.<\u002Fdiv>\n          <div class=\"body-md\">Countries lose ownership. Implementers lose agency. Patients lose continuity.<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <ul class=\"rule-list\">\n            <li><div class=\"rl-k\">→<\u002Fdiv><div class=\"rl-v\">Limited local capacity when 3rd-party systems dominate.<\u002Fdiv><\u002Fli>\n            <li><div class=\"rl-k\">→<\u002Fdiv><div class=\"rl-v\">Project-based funding in place of infrastructure investment.<\u002Fdiv><\u002Fli>\n            <li><div class=\"rl-k\">→<\u002Fdiv><div class=\"rl-v\">Systems that die the day the grant ends.<\u002Fdiv><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"meta\"><span><b>02<\u002Fb> — The Gap<\u002Fspan><span>OpenMRS · Pitch 2026<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 4. WHY NOW -->\n  <section class=\"slide\" data-label=\"Why Now\">\n    <aside class=\"sidebar\">\n      <svg class=\"mark\" viewBox=\"0 0 48 48\" xmlns=\"http://www.w3.org/2000/svg\"><path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath><path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath><path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath><path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath><\u002Fsvg>\n      <div class=\"foot\"><b>OpenMRS<\u002Fb> · Why Now<\u002Fdiv>\n    <\u002Faside>\n    <div class=\"body\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Why Now<\u002Fspan><span class=\"num\">· 03<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title title--sm\">A rare window for<br><em>locally owned<\u002Fem> infrastructure.<\u002Fh2>\n\n      <ol class=\"num-list mt-56\">\n        <li>\n          <div>\n            <div class=\"ni-title\">Governments are leading.<\u002Fdiv>\n            <div class=\"ni-body\">National digital health strategies have moved from aspiration to execution.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li>\n          <div>\n            <div class=\"ni-title\">Donor funding is tightening.<\u002Fdiv>\n            <div class=\"ni-body\">Sustainability pressure is reshaping every health-tech decision.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li>\n          <div>\n            <div class=\"ni-title\">The demographic clock is running.<\u002Fdiv>\n            <div class=\"ni-body\">Populations and workforces in Africa are scaling faster than the systems that serve them.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fli>\n      <\u002Fol>\n\n      <div class=\"meta\"><span><b>03<\u002Fb> — Why Now<\u002Fspan><span>OpenMRS · Pitch 2026<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 5. THE SOLUTION — stats slide -->\n  <section class=\"slide\" data-label=\"The Solution\">\n    <aside class=\"sidebar\">\n      <svg class=\"mark\" viewBox=\"0 0 48 48\" xmlns=\"http://www.w3.org/2000/svg\"><path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath><path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath><path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath><path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath><\u002Fsvg>\n      <div class=\"foot\"><b>OpenMRS<\u002Fb> · The Solution<\u002Fdiv>\n    <\u002Faside>\n    <div class=\"body\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>The Solution<\u002Fspan><span class=\"num\">· 04<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\">OpenMRS — already the <em>global standard.<\u002Fem><\u002Fh2>\n\n      <div class=\"stats mt-80\">\n        <div class=\"stat\">\n          <div class=\"sv\">80<span class=\"u\">+<\u002Fspan><\u002Fdiv>\n          <div class=\"sl\">countries running OpenMRS<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat\">\n          <div class=\"sv\">M's<\u002Fdiv>\n          <div class=\"sl\">of patients on the platform<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat\">\n          <div class=\"sv\">20<span class=\"u\">yrs<\u002Fspan><\u002Fdiv>\n          <div class=\"sl\">of proven clinical impact<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat\">\n          <div class=\"sv\">1<\u002Fdiv>\n          <div class=\"sl\">open, shared, neutral platform<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"body-md mt-56\" style=\"max-width: 44ch;\">A global digital public good — the foundation beneath an increasing share of national health systems.<\u002Fp>\n\n      <div class=\"meta\"><span><b>04<\u002Fb> — The Solution<\u002Fspan><span>OpenMRS · Pitch 2026<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 6. WHAT MAKES US DIFFERENT -->\n  <section class=\"slide\" data-label=\"What's Different\">\n    <aside class=\"sidebar\">\n      <svg class=\"mark\" viewBox=\"0 0 48 48\" xmlns=\"http://www.w3.org/2000/svg\"><path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath><path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath><path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath><path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath><\u002Fsvg>\n      <div class=\"foot\"><b>OpenMRS<\u002Fb> · Difference<\u002Fdiv>\n    <\u002Faside>\n    <div class=\"body\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>What Makes Us Different<\u002Fspan><span class=\"num\">· 05<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title title--sm\">The moat is the <em>community.<\u002Fem><\u002Fh2>\n\n      <div class=\"two-col mt-56\">\n        <div>\n          <p class=\"pull-quote\">Thousands of contributors. One shared codebase. No single vendor with their hand on the switch.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <ul class=\"rule-list\">\n            <li><div class=\"rl-k\">Scale<\u002Fdiv><div class=\"rl-v\">Thousands of global contributors, continuously improving.<\u002Fdiv><\u002Fli>\n            <li><div class=\"rl-k\">Trust<\u002Fdiv><div class=\"rl-v\">Neutral across governments, NGOs, and implementers.<\u002Fdiv><\u002Fli>\n            <li><div class=\"rl-k\">Quality<\u002Fdiv><div class=\"rl-v\">Community review is our long-term QA.<\u002Fdiv><\u002Fli>\n            <li><div class=\"rl-k\">Longevity<\u002Fdiv><div class=\"rl-v\">Community ownership is what survives funding cycles.<\u002Fdiv><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"meta\"><span><b>05<\u002Fb> — Difference<\u002Fspan><span>OpenMRS · Pitch 2026<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 7. VALUE PROPOSITION -->\n  <section class=\"slide\" data-label=\"Value Proposition\">\n    <aside class=\"sidebar\">\n      <svg class=\"mark\" viewBox=\"0 0 48 48\" xmlns=\"http://www.w3.org/2000/svg\"><path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath><path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath><path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath><path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath><\u002Fsvg>\n      <div class=\"foot\"><b>OpenMRS<\u002Fb> · Value<\u002Fdiv>\n    <\u002Faside>\n    <div class=\"body\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Value Proposition<\u002Fspan><span class=\"num\">· 06<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title title--sm\">One platform,<br><em>three kinds of value.<\u002Fem><\u002Fh2>\n\n      <div class=\"pillars\" style=\"margin-top: 48px;\">\n        <div class=\"pillar\">\n          <div class=\"p-num\">For Governments<\u002Fdiv>\n          <div class=\"p-title\">Sovereign<br>by design.<\u002Fdiv>\n          <div class=\"p-sub\">Low-cost. No vendor lock-in. A platform the state actually owns.<\u002Fdiv>\n          <div class=\"p-feat\"><span class=\"pf-label\">Outcome<\u002Fspan>Digital health sovereignty<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pillar\">\n          <div class=\"p-num\">For Businesses<\u002Fdiv>\n          <div class=\"p-title\">Build on the<br>shared rails.<\u002Fdiv>\n          <div class=\"p-sub\">Don't reinvent the core. Build services, integrations, and specialties on top.<\u002Fdiv>\n          <div class=\"p-feat\"><span class=\"pf-label\">Outcome<\u002Fspan>Local ecosystems, local jobs<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pillar\">\n          <div class=\"p-num\">For Funders<\u002Fdiv>\n          <div class=\"p-title\">Invest once,<br>scale globally.<\u002Fdiv>\n          <div class=\"p-sub\">Every improvement compounds across 80+ countries, not one.<\u002Fdiv>\n          <div class=\"p-feat\"><span class=\"pf-label\">Outcome<\u002Fspan>The highest-leverage dollar in digital health<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"meta\"><span><b>06<\u002Fb> — Value<\u002Fspan><span>OpenMRS · Pitch 2026<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 8. HOW IT WORKS -->\n  <section class=\"slide\" data-label=\"How It Works\">\n    <aside class=\"sidebar\">\n      <svg class=\"mark\" viewBox=\"0 0 48 48\" xmlns=\"http://www.w3.org/2000/svg\"><path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath><path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath><path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath><path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath><\u002Fsvg>\n      <div class=\"foot\"><b>OpenMRS<\u002Fb> · Structure<\u002Fdiv>\n    <\u002Faside>\n    <div class=\"body\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>How It Works<\u002Fspan><span class=\"num\">· 07<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title title--xs\">A <em>layered<\u002Fem> model —<br>each part doing what it does best.<\u002Fh2>\n\n      <ol class=\"num-list tight\" style=\"margin-top: 32px;\">\n        <li>\n          <div>\n            <div class=\"ni-title\">OpenMRS Inc.<\u002Fdiv>\n            <div class=\"ni-body\">Fiscal, legal, and infrastructure steward. Holds the IP on behalf of the community.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li>\n          <div>\n            <div class=\"ni-title\">The Community<\u002Fdiv>\n            <div class=\"ni-body\">Contributes, maintains, and innovates on the core platform.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li>\n          <div>\n            <div class=\"ni-title\">Local Partners<\u002Fdiv>\n            <div class=\"ni-body\">Implement and adapt systems to each country's reality.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li>\n          <div>\n            <div class=\"ni-title\">Governments<\u002Fdiv>\n            <div class=\"ni-body\">Own, sustain, and integrate systems into national health infrastructure.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fli>\n      <\u002Fol>\n\n      <div class=\"meta\"><span><b>07<\u002Fb> — How It Works<\u002Fspan><span>OpenMRS · Pitch 2026<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 9. 2030 VISION -->\n  <section class=\"slide\" data-label=\"2030 Vision\">\n    <aside class=\"sidebar\">\n      <svg class=\"mark\" viewBox=\"0 0 48 48\" xmlns=\"http://www.w3.org/2000/svg\"><path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath><path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath><path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath><path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath><\u002Fsvg>\n      <div class=\"foot\"><b>OpenMRS<\u002Fb> · 2030<\u002Fdiv>\n    <\u002Faside>\n    <div class=\"body\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>2030 Vision<\u002Fspan><span class=\"num\">· 08<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title title--sm\">By 2030, OpenMRS is <em>national infrastructure<\u002Fem> — not a project.<\u002Fh2>\n\n      <div class=\"two-col mt-56\" style=\"grid-template-columns: 1fr 1fr;\">\n        <div>\n          <div class=\"big-figure\">2030<\u002Fdiv>\n          <p class=\"body-md mt-40\" style=\"max-width: 22ch;\">The end state we're building toward.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <ul class=\"rule-list\">\n            <li><div class=\"rl-k\">Owned<\u002Fdiv><div class=\"rl-v\">Most deployments locally owned and financed.<\u002Fdiv><\u002Fli>\n            <li><div class=\"rl-k\">Ecosystem<\u002Fdiv><div class=\"rl-v\">Thriving local businesses built on OpenMRS.<\u002Fdiv><\u002Fli>\n            <li><div class=\"rl-k\">Funded<\u002Fdiv><div class=\"rl-v\">OpenMRS Inc. on sustainable, predictable funding.<\u002Fdiv><\u002Fli>\n            <li><div class=\"rl-k\">Integrated<\u002Fdiv><div class=\"rl-v\">Embedded in national health systems.<\u002Fdiv><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"meta\"><span><b>08<\u002Fb> — 2030 Vision<\u002Fspan><span>OpenMRS · Pitch 2026<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 10. TEAM -->\n  <section class=\"slide\" data-label=\"Team\">\n    <aside class=\"sidebar\">\n      <svg class=\"mark\" viewBox=\"0 0 48 48\" xmlns=\"http://www.w3.org/2000/svg\"><path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath><path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath><path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath><path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath><\u002Fsvg>\n      <div class=\"foot\"><b>OpenMRS<\u002Fb> · Team<\u002Fdiv>\n    <\u002Faside>\n    <div class=\"body\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Team &amp; Expertise<\u002Fspan><span class=\"num\">· 09<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title title--sm\">A <em>lean core<\u002Fem> with a global reach.<\u002Fh2>\n\n      <div class=\"stats mt-80\" style=\"grid-template-columns: repeat(3, 1fr);\">\n        <div class=\"stat\">\n          <div class=\"sv\">20<span class=\"u\">yrs<\u002Fspan><\u002Fdiv>\n          <div class=\"sl\">in global health informatics, combined across leadership<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat\">\n          <div class=\"sv\">∞<\u002Fdiv>\n          <div class=\"sl\">global network of developers and implementers<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat\">\n          <div class=\"sv\">Gov.<\u002Fdiv>\n          <div class=\"sl\">trusted relationships with ministries of health<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"body-md mt-80\" style=\"max-width: 48ch;\">The small team is the leverage point. Most of the work happens through the community we coordinate.<\u002Fp>\n\n      <div class=\"meta\"><span><b>09<\u002Fb> — Team<\u002Fspan><span>OpenMRS · Pitch 2026<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 11. THE MISSING PIECE (section divider) -->\n  <section class=\"section-slide\" data-label=\"The Missing Piece\">\n    <svg class=\"section-watermark\" viewBox=\"0 0 48 48\" xmlns=\"http://www.w3.org/2000/svg\"><path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath><path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath><path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath><path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath><\u002Fsvg>\n    <div class=\"section-inner\">\n      <div class=\"sec-num\">Part Two · Financing<\u002Fdiv>\n      <h2 class=\"sec-title\">Scale and impact —<br>without <em>sustainable funding.<\u002Fem><\u002Fh2>\n      <p class=\"sec-sub\">OpenMRS has reach. What it doesn't have is a funding model that matches the horizon of the mission. That's what the rest of this deck is about.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 12. THREE MODELS -->\n  <section class=\"slide\" data-label=\"Three Models\">\n    <aside class=\"sidebar\">\n      <svg class=\"mark\" viewBox=\"0 0 48 48\" xmlns=\"http
