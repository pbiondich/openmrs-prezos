://www.w3.org/2000/svg\"><path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath><path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath><path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath><path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath><\u002Fsvg>\n      <div class=\"foot\"><b>OpenMRS<\u002Fb> · Three Models<\u002Fdiv>\n    <\u002Faside>\n    <div class=\"body\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Three Funding Models<\u002Fspan><span class=\"num\">· 11<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title title--sm\">Three paths.<br><em>Complementary, not competing.<\u002Fem><\u002Fh2>\n\n      <div class=\"pillars\" style=\"margin-top: 40px;\">\n        <div class=\"pillar\">\n          <div class=\"p-num\">Model 01 · Public<\u002Fdiv>\n          <div class=\"p-title\">Public<br>Infrastructure.<\u002Fdiv>\n          <div class=\"p-sub\">Governments fund OpenMRS as core health infrastructure.<\u002Fdiv>\n          <div class=\"p-feat\"><span class=\"pf-label\">Horizon<\u002Fspan>Long-term end state<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pillar\">\n          <div class=\"p-num\">Model 02 · Ecosystem<\u002Fdiv>\n          <div class=\"p-title\">Ecosystem<br>Contribution.<\u002Fdiv>\n          <div class=\"p-sub\">Monetize the network of partners, not the platform itself.<\u002Fdiv>\n          <div class=\"p-feat\"><span class=\"pf-label\">Horizon<\u002Fspan>Mid-term stability<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pillar\">\n          <div class=\"p-num\">Model 03 · Enterprise<\u002Fdiv>\n          <div class=\"p-title\">Enterprise<br>Services.<\u002Fdiv>\n          <div class=\"p-sub\">Premium hosting, SLAs, and advanced capabilities for implementers.<\u002Fdiv>\n          <div class=\"p-feat\"><span class=\"pf-label\">Horizon<\u002Fspan>Near-term revenue<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"meta\"><span><b>11<\u002Fb> — Three Models<\u002Fspan><span>OpenMRS · Pitch 2026<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 13. MODEL 1 -->\n  <section class=\"slide\" data-label=\"Model 1\">\n    <aside class=\"sidebar\">\n      <svg class=\"mark\" viewBox=\"0 0 48 48\" xmlns=\"http://www.w3.org/2000/svg\"><path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath><path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath><path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath><path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath><\u002Fsvg>\n      <div class=\"foot\"><b>OpenMRS<\u002Fb> · Model 01<\u002Fdiv>\n    <\u002Faside>\n    <div class=\"body\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Model 01<\u002Fspan><span class=\"num\">· Public Infrastructure<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title title--sm\">Governments fund OpenMRS<br>as <em>core infrastructure.<\u002Fem><\u002Fh2>\n\n      <div class=\"two-col mt-56\">\n        <div>\n          <p class=\"pull-quote\">Funded the way roads and power grids are funded — because that's what a national EMR actually is.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <ul class=\"rule-list\">\n            <li><div class=\"rl-k\">Mechanism<\u002Fdiv><div class=\"rl-v\">National agreements and pooled multi-country funding.<\u002Fdiv><\u002Fli>\n            <li><div class=\"rl-k\">Dynamic<\u002Fdiv><div class=\"rl-v\">Scales naturally with adoption.<\u002Fdiv><\u002Fli>\n            <li><div class=\"rl-k\">Trade-off<\u002Fdiv><div class=\"rl-v\">Right end state — slow to activate.<\u002Fdiv><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"meta\"><span><b>12<\u002Fb> — Model 01<\u002Fspan><span>OpenMRS · Pitch 2026<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 14. MODEL 2 -->\n  <section class=\"slide\" data-label=\"Model 2\">\n    <aside class=\"sidebar\">\n      <svg class=\"mark\" viewBox=\"0 0 48 48\" xmlns=\"http://www.w3.org/2000/svg\"><path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath><path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath><path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath><path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath><\u002Fsvg>\n      <div class=\"foot\"><b>OpenMRS<\u002Fb> · Model 02<\u002Fdiv>\n    <\u002Faside>\n    <div class=\"body\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Model 02<\u002Fspan><span class=\"num\">· Ecosystem Contribution<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title title--sm\">Monetize the <em>ecosystem<\u002Fem> —<br>keep the platform free.<\u002Fh2>\n\n      <div class=\"two-col mt-56\">\n        <div>\n          <p class=\"pull-quote\">Partners pay to be part of the network. The platform itself stays open.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <ul class=\"rule-list\">\n            <li><div class=\"rl-k\">Certify<\u002Fdiv><div class=\"rl-v\">A quality standard implementers can credibly meet.<\u002Fdiv><\u002Fli>\n            <li><div class=\"rl-k\">Tier<\u002Fdiv><div class=\"rl-v\">Partner levels with real benefits and clear commitments.<\u002Fdiv><\u002Fli>\n            <li><div class=\"rl-k\">Market<\u002Fdiv><div class=\"rl-v\">A marketplace for modules, services, and specialties.<\u002Fdiv><\u002Fli>\n          <\u002Ful>\n          <p class=\"body-md mt-40\">Stabilizes funding. Strengthens quality.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"meta\"><span><b>13<\u002Fb> — Model 02<\u002Fspan><span>OpenMRS · Pitch 2026<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 15. MODEL 3 -->\n  <section class=\"slide\" data-label=\"Model 3\">\n    <aside class=\"sidebar\">\n      <svg class=\"mark\" viewBox=\"0 0 48 48\" xmlns=\"http://www.w3.org/2000/svg\"><path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath><path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath><path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath><path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath><\u002Fsvg>\n      <div class=\"foot\"><b>OpenMRS<\u002Fb> · Model 03<\u002Fdiv>\n    <\u002Faside>\n    <div class=\"body\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Model 03<\u002Fspan><span class=\"num\">· Enterprise Services<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title title--sm\">Services, not licenses —<br>the <em>fastest to revenue.<\u002Fem><\u002Fh2>\n\n      <div class=\"two-col mt-56\">\n        <div>\n          <p class=\"pull-quote\">Implementers already pay for hosting, support, and uptime. Today it goes elsewhere.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <ul class=\"rule-list\">\n            <li><div class=\"rl-k\">Host<\u002Fdiv><div class=\"rl-v\">Managed OpenMRS, ready on day one.<\u002Fdiv><\u002Fli>\n            <li><div class=\"rl-k\">Support<\u002Fdiv><div class=\"rl-v\">SLAs that meet real operational standards.<\u002Fdiv><\u002Fli>\n            <li><div class=\"rl-k\">Extend<\u002Fdiv><div class=\"rl-v\">Advanced capabilities and premium modules.<\u002Fdiv><\u002Fli>\n          <\u002Ful>\n          <p class=\"body-md mt-40\">Fastest revenue — requires strong execution.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"meta\"><span><b>14<\u002Fb> — Model 03<\u002Fspan><span>OpenMRS · Pitch 2026<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 16. THE ASK -->\n  <section class=\"slide\" data-label=\"The Ask\">\n    <aside class=\"sidebar\">\n      <svg class=\"mark\" viewBox=\"0 0 48 48\" xmlns=\"http://www.w3.org/2000/svg\"><path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath><path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath><path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath><path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath><\u002Fsvg>\n      <div class=\"foot\"><b>OpenMRS<\u002Fb> · The Ask<\u002Fdiv>\n    <\u002Faside>\n    <div class=\"body\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>The Ask<\u002Fspan><span class=\"num\">· 15<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title title--xs\">Underwrite the <em>transition<\u002Fem> —<br>until the models take root.<\u002Fh2>\n\n      <div class=\"callout mt-40\">\n        <div class=\"co-label\">What we're asking for<\u002Fdiv>\n        <p class=\"co-body\">Catalytic, multi-year support for OpenMRS Inc.'s core functions while we stand up and test the three financing models.<\u002Fp>\n      <\u002Fdiv>\n\n      <ul class=\"rule-list mt-40\">\n        <li><div class=\"rl-k\">Community<\u002Fdiv><div class=\"rl-v\">Developers, translators, writers, and users — the engine of the platform.<\u002Fdiv><\u002Fli>\n        <li><div class=\"rl-k\">Stewardship<\u002Fdiv><div class=\"rl-v\">Trademarks, infrastructure, and reserves held on behalf of the community.<\u002Fdiv><\u002Fli>\n        <li><div class=\"rl-k\">Convening<\u002Fdiv><div class=\"rl-v\">Code sprints, hackathons, and the annual Implementers Meeting.<\u002Fdiv><\u002Fli>\n      <\u002Ful>\n\n      <div class=\"meta\"><span><b>15<\u002Fb> — The Ask<\u002Fspan><span>OpenMRS · Pitch 2026<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 17. SEQUENCED PATH -->\n  <section class=\"slide\" data-label=\"Sequenced Path\">\n    <aside class=\"sidebar\">\n      <svg class=\"mark\" viewBox=\"0 0 48 48\" xmlns=\"http://www.w3.org/2000/svg\"><path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath><path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath><path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath><path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath><\u002Fsvg>\n      <div class=\"foot\"><b>OpenMRS<\u002Fb> · Sequence<\u002Fdiv>\n    <\u002Faside>\n    <div class=\"body\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Sequenced Path to Sustainability<\u002Fspan><span class=\"num\">· 16<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title title--sm\">A <em>phased<\u002Fem> plan —<br>each stage de-risks the next.<\u002Fh2>\n\n      <div class=\"timeline mt-80\">\n        <div class=\"tl-item\">\n          <div class=\"tl-dot\"><\u002Fdiv>\n          <div class=\"tl-phase\">Phase 01 · 0–2 yrs<\u002Fdiv>\n          <div class=\"tl-title\">Services<br>&amp; Ecosystem.<\u002Fdiv>\n          <div class=\"tl-body\">Revenue fastest. Product maturity compounds.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tl-item\">\n          <div class=\"tl-dot\"><\u002Fdiv>\n          <div class=\"tl-phase\">Phase 02 · 2–5 yrs<\u002Fdiv>\n          <div class=\"tl-title\">Government<br>Positioning.<\u002Fdiv>\n          <div class=\"tl-body\">Evidence base, national agreements, pooled funding.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tl-item ghost\">\n          <div class=\"tl-dot\"><\u002Fdiv>\n          <div class=\"tl-phase\">Phase 03 · 5+ yrs<\u002Fdiv>\n          <div class=\"tl-title\">Infrastructure<br>Funding.<\u002Fdiv>\n          <div class=\"tl-body\">Governments sustain the platform. System-funded at last.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"meta\"><span><b>16<\u002Fb> — Sequence<\u002Fspan><span>OpenMRS · Pitch 2026<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 18. WHAT THIS UNLOCKS -->\n  <section class=\"slide\" data-label=\"What This Unlocks\">\n    <aside class=\"sidebar\">\n      <svg class=\"mark\" viewBox=\"0 0 48 48\" xmlns=\"http://www.w3.org/2000/svg\"><path fill=\"#F26522\" d=\"M24.012 12.354c-3.22 0-6.135 1.305-8.244 3.414L15.76 8.08C18.228 6.808 21.044 6 24.012 6c2.966 0 5.767.718 8.234 1.989l-.008 7.763a11.62 11.62 0 0 0-8.226-3.398\"><\u002Fpath><path fill=\"#5B57A6\" d=\"M23.995 35.646c3.22 0 6.133-1.304 8.242-3.413l-.006 7.778A17.9 17.9 0 0 1 23.995 42a17.94 17.94 0 0 1-8.236-1.99l.009-7.763a11.63 11.63 0 0 0 8.228 3.398\"><\u002Fpath><path fill=\"#EEA616\" d=\"M15.767 32.233a11.62 11.62 0 0 1-3.414-8.241c0-3.212 1.299-6.119 3.399-8.228l-7.763-.008A17.94 17.94 0 0 0 6 23.992c0 2.967.718 5.768 1.99 8.236z\"><\u002Fpath><path fill=\"#009384\" d=\"M35.647 24a11.62 11.62 0 0 0-3.414-8.243l7.778.006A17.94 17.94 0 0 1 42.001 24c0 2.967-.718 5.767-1.99 8.235l-7.763-.009A11.62 11.62 0 0 0 35.647 24\"><\u002Fpath><\u002Fsvg>\n      <div class=\"foot\"><b>OpenMRS<\u002Fb> · Unlocks<\u002Fdiv>\n    <\u002Faside>\n    <div class=\"body\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>What This Unlocks<\u002Fspan><span class=\"num\">· 17<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title title--sm\">One of the most<br><em>leveraged bets<\u002Fem> in global health.<\u002Fh2>\n\n      <div class=\"two-col mt-56\">\n        <div>\n          <p class=\"pull-quote\">A platform serving hundreds of millions of patients — owned by the countries that use it.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <ul class=\"rule-list\">\n            <li><div class=\"rl-k\">Predictable<\u002Fdiv><div class=\"rl-v\">Sustainable funding for OpenMRS Inc.<\u002Fdiv><\u002Fli>\n            <li><div class=\"rl-k\">Stronger<\u002Fdiv><div class=\"rl-v\">Better delivery and quality assurance across countries.<\u002Fdiv><\u002Fli>\n            <li><div class=\"rl-k\">Clearer<\u002Fdiv><div class=\"rl-v\">A real value exchange with every stakeholder.<\u002Fdiv><\u002Fli>\n            <li><div class=\"rl-k\">Positioned<\u002Fdiv><div class=\"rl-v\">Global health infrastructure — not a project.<\u002Fdiv><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"meta\"><span><b>17<\u002Fb> — What This Unlocks<\u002Fspan><span>OpenMRS · Pitch 2026<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n\n\n\n<\u002Fbody><\u002Fhtml>"
